<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Gig Casino</title>
    <script src="https://telegram.org"></script>
    <style>
        :root { --bg: #000; --card: #151515; --accent: #9d4edd; --gray: #888; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; padding: 0; height: 100vh; overflow: hidden; }
        
        /* ЛОАДЕР */
        #loader {
            position: fixed; inset: 0; background: #0f1721;
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100;
        }
        .spinner { width: 40px; height: 40px; border: 4px solid #3390ec33; border-top-color: #3390ec; border-radius: 50%; animation: s 1s infinite linear; }
        @keyframes s { to { transform: rotate(360deg); } }

        /* МЕНЮ */
        #app { display: none; flex-direction: column; height: 100vh; }
        .header { padding: 20px; display: flex; justify-content: space-between; }
        .bal { color: var(--accent); font-weight: bold; background: #9d4edd1a; padding: 5px 15px; border-radius: 20px; }
        .card { background: linear-gradient(180deg, #2d1b4d, #151515); margin: 0 20px; padding: 30px; border-radius: 25px; text-align: center; border: 1px solid #ffffff0d; }
        .ava { width: 80px; height: 80px; background: #333; border-radius: 20px; margin: 0 auto 15px; border: 2px solid var(--accent); }
        .stats { display: flex; justify-content: space-around; margin-top: 20px; border-top: 1px solid #ffffff1a; padding-top: 20px; }
        .btn { background: var(--accent); margin: 20px; padding: 18px; border-radius: 20px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <p style="color:#3390ec; margin-top:15px">GIG CASINO</p>
</div>

<div id="app">
    <div class="header">
        <span>⚙️</span>
        <div class="bal">💎 <span id="b">5 000</span></div>
    </div>
    <div class="card">
        <div class="ava" id="p"></div>
        <div id="n" style="font-size:20px; font-weight:bold">@Игрок</div>
        <div class="stats">
            <div><div id="g">0</div><small style="color:var(--gray)">ИГРЫ</small></div>
            <div><div id="w">0 💎</div><small style="color:var(--gray)">ВИН</small></div>
        </div>
    </div>
    <div class="btn" onclick="alert('Скоро!')">ИГРАТЬ 🚀</div>
</div>

<script>
    // 1. ФУНКЦИЯ ВКЛЮЧЕНИЯ (ОБЯЗАТЕЛЬНО В НАЧАЛЕ)
    function showApp() {
        document.getElementById('loader').style.display = 'none';
        document.getElementById('app').style.display = 'flex';
    }

    // 2. ГАРАНТИРОВАННЫЙ ТАЙМЕР (ДАЖЕ ЕСЛИ ВСЕ УПАДЕТ)
    setTimeout(showApp, 2000);

    // 3. ЛОГИКА ТЕЛЕГРАМА (В ТРАЙ-КЭТЧ)
    try {
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        const u = tg.initDataUnsafe?.user;
        if(u) {
            document.getElementById('n').innerText = u.username ? '@'+u.username : u.first_name;
            if(u.photo_url) document.getElementById('p').innerHTML = `<img src="${u.photo_url}" style="width:100%;height:100%;border-radius:20px">`;
        }
    } catch(e) { 
        console.log('TG Error'); 
    }
</script>
</body>
</html>
