<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GIG CASINO</title>

    <!-- 1. ПОДКЛЮЧАЕМ БИБЛИОТЕКИ (ТОЛЬКО ТАК) -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>

    
  <style>
    /* 1. ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ */
    :root { 
        --bg: #000; 
        --accent: #9d4edd; 
        --card: #151515; 
        --gray: #888; 
        --success: #4cd137;
        --error: #ff4757;
        --text: #ffffff;
    }
    
    body { 
        background: var(--bg); 
        color: var(--text); 
        font-family: -apple-system, system-ui, sans-serif; 
        margin: 0; 
        padding: 0; 
        overflow: hidden; 
        height: 100vh; 
    }

    /* 2. ЭКРАН ЗАГРУЗКИ */
    #loader { 
        position: fixed; inset: 0; background: #0f1721; 
        display: flex; flex-direction: column; align-items: center; justify-content: center; 
        z-index: 10000; transition: 0.5s;
    }
    .spinner { 
        width: 40px; height: 40px; border: 4px solid rgba(51, 144, 236, 0.1); 
        border-top: 4px solid #3390ec; border-radius: 50%; animation: spin 1s linear infinite; 
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 3. КОНТЕНТ И ЭКРАНЫ */
    #app { display: none; flex-direction: column; height: 100vh; opacity: 0; transition: 0.5s; }
    .screen { display: none; flex-direction: column; height: 100%; overflow-y: auto; padding-bottom: 100px; }
    .active { display: flex !important; }
    
    /* 4. КНОПКИ (ИСПРАВЛЕНИЕ ЦВЕТА) */
    .btn-main {
        background: var(--accent) !important;
        color: #fff !important;
        margin: 15px;
        padding: 20px;
        border-radius: 20px;
        text-align: center;
        font-weight: 800;
        font-size: 16px;
        cursor: pointer;
        border: none;
        box-shadow: 0 4px 15px rgba(157, 78, 221, 0.3);
    }

    /* 5. ИНТЕРФЕЙС КУБИКА (OVERLAY) */
    #dice-overlay {
        position: fixed; inset: 0; background: rgba(0,0,0,0.95);
        display: none; flex-direction: column; align-items: center; justify-content: center; 
        z-index: 9999; backdrop-filter: blur(10px);
    }
    
    .dice {
        width: 110px; height: 110px; background: #fff !important; border-radius: 25px;
        display: flex; align-items: center; justify-content: center;
        font-size: 65px; color: #000 !important; 
        box-shadow: 0 0 50px var(--accent);
        z-index: 10000;
    }

    /* 6. АНИМАЦИЯ КУБИКА */
    .rolling { 
        animation: roll 0.12s infinite linear !important; 
    }
    
    @keyframes roll {
        0% { transform: rotate(0deg) scale(1); }
        25% { transform: rotate(90deg) translateY(-5px); }
        50% { transform: rotate(180deg) scale(1.1); }
        75% { transform: rotate(270deg) translateY(5px); }
        100% { transform: rotate(360deg) scale(1); }
    }

    /* 7. МЕНЮ */
    nav { 
        position: fixed; bottom: 0; width: 100%; background: #0a0a0a; 
        display: flex; justify-content: space-around; padding: 15px 0 35px; 
        border-top: 1px solid #1a1a1a; z-index: 1000; 
    }
    nav div { color: var(--gray); font-size: 10px; text-align: center; cursor: pointer; }
</style>

        
    
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <p style="color:#3390ec; margin-top:15px; font-weight: bold; letter-spacing: 2px;">GIG CASINO</p>
    </div>

    <div id="app">

        <!-- ОКНО ИГРЫ В КУБИК -->
    <div id="dice-overlay">
        <div id="dice-visual" class="dice">?</div>
        <h2 id="dice-status" style="margin-top: 25px;">Крутим...</h2>
        <button id="dice-close" onclick="closeDice()" style="display:none; background: var(--accent); border: none; color: #fff; padding: 10px 30px; border-radius: 10px; margin-top: 15px;">ОК</button>
    </div>
                <!-- ЭКРАН 1: ПРОФИЛЬ -->
        <div id="scr-profile" class="screen active">
            <div style="padding: 20px; display: flex; justify-content: space-between; align-items: center;">
                <div style="font-size: 20px;">⚙️</div>
                <div style="background: rgba(157, 78, 221, 0.1); padding: 6px 14px; border-radius: 20px; color: var(--accent); font-weight: bold; border: 1px solid rgba(157, 78, 221, 0.2);">
                    💎 <span id="top-bal">5 000</span>
                </div>
            </div>

            <div style="background: linear-gradient(180deg, #2d1b4d 0%, #151515 100%); margin: 10px 15px; border-radius: 28px; padding: 30px 20px; text-align: center; border: 1px solid rgba(255,255,255,0.05);">
                <div style="width: 85px; height: 85px; background: #222; border-radius: 25px; margin: 0 auto 15px; border: 2px solid var(--accent); overflow: hidden;">
                    <img id="u-photo" src="https://placeholder.com" style="width: 100%; height: 100%; object-fit: cover;">
                </div>
                <div id="u-name" style="font-size: 22px; font-weight: 900; margin-bottom: 5px;">@Игрок</div>
                <div id="u-id" style="font-size: 11px; color: var(--gray); margin-bottom: 20px;">ID: 000000</div>
                
                <div style="display: flex; justify-content: space-around; margin-top: 25px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 20px;">
                    <div style="text-align: center;"><b id="s-games" style="display: block; font-size: 20px;">0</b><small style="color: var(--gray); font-size: 10px; text-transform: uppercase;">Игры</small></div>
                    <div style="text-align: center;"><b id="s-win" style="display: block; font-size: 20px;">0 💎</b><small style="color: var(--gray); font-size: 10px; text-transform: uppercase;">Рекорд</small></div>
                </div>
            </div>

            <!-- МЕСТО ДЛЯ КНОПКИ КОШЕЛЬКА -->
            <div id="ton-connect-btn"></div>

            <div onclick="showTab('scr-arena')" style="background: var(--accent); color: #fff; margin: 15px; padding: 20px; border-radius: 20px; text-align: center; font-weight: 800; font-size: 16px; cursor: pointer;">ИГРАТЬ 🚀</div>
            <div onclick="window.Telegram.WebApp.showPopup({message:'Статистика в разработке'})" style="background: #151515; color: #fff; margin: 0 15px; padding: 18px; border-radius: 20px; text-align: center; font-weight: bold; border: 1px solid #333; cursor: pointer;">📊 СТАТИСТИКА</div>
        </div>

        <!-- ЭКРАН 2: АРЕНА (16 ИГР) -->
        <div id="scr-arena" class="screen">
            <div style="padding: 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: #000; z-index: 100;">
                <div onclick="showTab('scr-profile')" style="font-size: 20px;">⬅️</div>
                <b style="font-size: 18px;">АРЕНА</b>
                <div style="color: var(--accent); font-weight: bold;">💎 5000</div>
            </div>
            
            <div id="games-list" style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 10px 15px;">
                <!-- Игры создаст скрипт в 3-й части -->
            </div>
        </div>

        <!-- НИЖНЕЕ МЕНЮ -->
        <nav style="position: fixed; bottom: 0; width: 100%; background: #0a0a0a; display: flex; justify-content: space-around; padding: 15px 0 35px; border-top: 1px solid #1a1a1a; z-index: 1000;">
            <div onclick="window.Telegram.WebApp.showAlert('Маркет скоро!')" style="color: var(--gray); font-size: 10px; text-align: center; flex: 1; cursor: pointer;">🛒<br>Маркет</div>
            <div id="n-arena" onclick="showTab('scr-arena')" style="color: var(--gray); font-size: 10px; text-align: center; flex: 1; cursor: pointer;">⚔️<br>Арена</div>
            <div onclick="window.Telegram.WebApp.showAlert('Инвентарь пуст')" style="color: var(--gray); font-size: 10px; text-align: center; flex: 1; cursor: pointer;">🎁<br>Склад</div>
            <div id="n-profile" onclick="showTab('scr-profile')" style="color: white; font-size: 10px; text-align: center; flex: 1; cursor: pointer;">👤<br>Профиль</div>
        </nav>

    </div>

       <script>
    const tg = window.Telegram.WebApp;
    
    // Глобальная переменная для TonConnect (чтобы была доступна везде)
    let tonConnectUI;

    // 1. ПОДГОТОВКА ПРИЛОЖЕНИЯ
    function initApp() {
        try {
            tg.ready();
            tg.expand(); // Разворачиваем на весь экран

            // Загружаем данные пользователя
            const user = tg.initDataUnsafe?.user;
            if (user) {
                // Имя пользователя
                const nameEl = document.getElementById('u-name');
                if (nameEl) nameEl.innerText = user.username ? '@' + user.username : user.first_name;
                
                // ID пользователя
                const idEl = document.getElementById('u-id');
                if (idEl) idEl.innerText = 'ID: ' + user.id;

                // Фото профиля
                const photoEl = document.getElementById('u-photo');
                if (user.photo_url && photoEl) {
                    photoEl.src = user.photo_url;
                    photoEl.style.display = 'block';
                }
            }
        } catch (e) {
            console.error("Ошибка инициализации профиля:", e);
        }
    }

               // 2. ПЕРЕКЛЮЧЕНИЕ ВКЛАДОК
    function showTab(id) {
        // Скрываем все экраны
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        // Показываем нужный
        const target = document.getElementById(id);
        if (target) target.classList.add('active');
        
        // Подсветка кнопок в меню (если ID совпадает)
        const nArena = document.getElementById('n-arena');
        const nProfile = document.getElementById('n-profile');
        
        if (nArena) nArena.style.color = (id === 'scr-arena') ? 'var(--accent)' : 'var(--gray)';
        if (nProfile) nProfile.style.color = (id === 'scr-profile') ? '#fff' : 'var(--gray)';
        
        // Тактильная отдача
        tg.HapticFeedback.impactOccurred('light');
    }

               // 3. ПОЛНЫЙ СПИСОК ИГР (16 ШТУК)
    const gameLibrary = [
        { n: "Кубик", i: "🎲" }, { n: "Слот Классик", i: "🎰" },
        { n: "Цель", i: "🎯" }, { n: "Орел/Решка", i: "🪙" },
        { n: "Пульс X100", i: "📈" }, { n: "Пульс Stable", i: "📉" },
        { n: "Кейс Крипта", i: "📦" }, { n: "Кейс NFT", i: "🖼" },
        { n: "Слот Золото", i: "💰" }, { n: "Слот Фрукты", i: "🍎" },
        { n: "Слот Египет", i: "🏺" }, { n: "Карты", i: "🃏", pvp: true },
        { n: "Рулетка", i: "🔫", pvp: true }, { n: "Портал", i: "🌀" },
        { n: "Мины", i: "💣" }, { n: "Краш", i: "🚀" }
    ];

    // Функция отрисовки карточек
    function renderGames() {
        const grid = document.getElementById('games-list');
        if (!grid) return;
        
        grid.innerHTML = ""; // Чистим перед рендером

        gameLibrary.forEach(g => {
            const div = document.createElement('div');
            div.style = "background:var(--card); border-radius:20px; padding:20px; border:1px solid #222; text-align:center; position:relative; cursor:pointer;";
            
            div.onclick = () => {
                tg.HapticFeedback.impactOccurred('medium');
                if (g.n === "Кубик") {
                    openBetPopup(); // Открываем выбор ставки
                } else {
                    tg.showAlert(`Игра "${g.n}" в разработке 🛠`);
                }
            };

            div.innerHTML = `
                ${g.pvp ? '<span style="position:absolute;top:8px;right:8px;background:var(--accent);font-size:8px;padding:2px 6px;border-radius:8px;font-weight:bold;">PVP</span>' : ''}
                <div style="font-size:38px;margin-bottom:10px;">${g.i}</div>
                <div style="font-size:13px;font-weight:bold;">${g.n}</div>
            `;
            grid.appendChild(div);
        });
    }

    // 4. ОКНО ВЫБОРА СТАВКИ
    function openBetPopup() {
        tg.showPopup({
            title: 'Ставка на Кубик',
            message: 'Выберите сумму (Победа x3 при выпадении 6)',
            buttons: [
                { id: '100', type: 'default', text: '100 💎' },
                { id: '500', type: 'default', text: '500 💎' },
                { id: '1000', type: 'default', text: '1000 💎' },
                { type: 'cancel', text: 'Отмена' }
            ]
        }, (buttonId) => {
            if (buttonId && buttonId !== 'cancel') {
                startDiceGame(parseInt(buttonId)); // Переходим к самой игре
            }
        });
    }

               // 5. ОСНОВНАЯ ЛОГИКА ИГРЫ КУБИК
    function startDiceGame(bet) {
        const balLabel = document.getElementById('top-bal');
        // Очищаем текст баланса от пробелов и символов, чтобы получить число
        let currentBal = parseInt(balLabel.innerText.replace(/[^0-9]/g, ''));

        if (currentBal < bet) {
            tg.showAlert("У вас недостаточно камней! 💎");
            return;
        }

        // ШАГ 1: Визуально списываем ставку СРАЗУ
        currentBal -= bet;
        balLabel.innerText = currentBal.toLocaleString();

        // ШАГ 2: Подготовка элементов оверлея
        const overlay = document.getElementById('dice-overlay');
        const visual = document.getElementById('dice-visual');
        const status = document.getElementById('dice-status');
        const closeBtn = document.getElementById('dice-close');

        if (!overlay || !visual) return;

        // ШАГ 3: Запуск анимации
        overlay.style.display = 'flex';
        visual.classList.add('rolling'); // Тот самый класс из CSS
        visual.innerText = "🎲";
        status.innerText = "Удача выбирает число...";
        closeBtn.style.display = 'none';

        // ШАГ 4: Имитация броска (2 секунды)
        setTimeout(() => {
            // Останавливаем вращение
            visual.classList.remove('rolling');
            
            // Генерируем результат (1-6)
            const res = Math.floor(Math.random() * 6) + 1;
            const diceFaces = ["", "⚀", "⚁", "⚂", "⚃", "⚄", "⚅"];
            visual.innerText = diceFaces[res];

            // Проверка условий победы
            if (res === 6) {
                const winAmount = bet * 3;
                currentBal += winAmount;
                balLabel.innerText = currentBal.toLocaleString();
                status.innerHTML = `<span style="color:var(--success)">🔥 ПОБЕДА! +${winAmount} 💎</span>`;
                tg.HapticFeedback.notificationOccurred('success');
            } else {
                status.innerHTML = `<span style="color:var(--error)">Выпало ${res}. Проигрыш</span>`;
                tg.HapticFeedback.notificationOccurred('error');
            }

            // Показываем кнопку выхода
            closeBtn.style.display = 'block';

            // ШАГ 5: Передача данных боту для сохранения в базу
            // Важно: это закроет бота, поэтому делаем это только в конце
            tg.sendData(JSON.stringify({
                action: "game_result",
                amount: (res === 6) ? (bet * 2) : -bet
            }));
        }, 2000);
    }

    // Функция закрытия окна кубика
    function closeDice() {
        const overlay = document.getElementById('dice-overlay');
        if (overlay) overlay.style.display = 'none';
        tg.HapticFeedback.impactOccurred('light');
    }
    // 6. ИНИЦИАЛИЗАЦИЯ TON CONNECT
    function initTon() {
        try {
            tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
                manifestUrl: 'https://github.io',
                buttonRootId: 'ton-connect-btn'
            });

            // Слушаем статус кошелька
            tonConnectUI.onStatusChange(wallet => {
                if (wallet) {
                    tg.sendData(JSON.stringify({
                        action: "bind_wallet",
                        address: wallet.account.address
                    }));
                    tg.showAlert("✅ Кошелек успешно привязан!");
                }
            });
        } catch (e) {
            console.error("TonConnect Error:", e);
        }
    }

    // 7. ЗАПУСК ПРИЛОЖЕНИЯ (ГЛАВНАЯ ТОЧКА ВХОДА)
    window.onload = function() {
        // Запускаем инициализацию профиля (из Блока 1)
        initApp();
        
        // Отрисовываем 16 игр на арене (из Блока 3)
        renderGames();
        
        // Подключаем TON
        initTon();

        // Скрываем загрузочный экран
        setTimeout(() => {
            const loader = document.getElementById('loader');
            const app = document.getElementById('app');
            
            if (loader) loader.style.opacity = '0';
            
            setTimeout(() => {
                if (loader) loader.style.display = 'none';
                if (app) {
                    app.style.display = 'flex';
                    setTimeout(() => { app.style.opacity = '1'; }, 50);
                }
            }, 500);
        }, 2000);
    };
</script>


</body>
</html>
