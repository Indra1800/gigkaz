<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Gig Casino Profile</title>
    <script src="https://telegram.org"></script>
    <style>
        :root { --bg-color: #000000; --card-bg: #151515; --accent: #9d4edd; --text-main: #ffffff; --text-gray: #888888; }
        body { background: var(--bg-color); color: var(--text-main); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; }
        
        /* Хедер */
        .header { padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .balance-top { background: rgba(157, 78, 221, 0.1); padding: 5px 12px; border-radius: 20px; color: var(--accent); font-weight: bold; display: flex; align-items: center; gap: 5px; }

        /* Карточка профиля */
        .profile-card { background: linear-gradient(180deg, #2d1b4d 0%, #151515 100%); margin: 10px 15px; border-radius: 24px; padding: 25px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .avatar { width: 80px; height: 80px; background: white; border-radius: 20px; margin: 0 auto 15px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .username { font-size: 20px; font-weight: bold; margin-bottom: 20px; }
        
        .stats-grid { display: flex; justify-content: space-around; border-top: 1px solid rgba(255,255,255,0.1); pt: 15px; padding-top: 15px; }
        .stat-item { display: flex; flex-direction: column; gap: 5px; }
        .stat-val { font-size: 18px; font-weight: bold; }
        .stat-lbl { font-size: 12px; color: var(--text-gray); }

        /* Кнопка */
        .action-btn { background: var(--accent); color: white; margin: 20px 15px; padding: 18px; border-radius: 18px; text-align: center; font-weight: bold; font-size: 16px; cursor: pointer; }

        /* Нижнее меню */
        .nav-bar { margin-top: auto; background: #111; display: flex; justify-content: space-around; padding: 15px 0 30px; border-radius: 30px 30px 0 0; }
        .nav-item { color: var(--text-gray); font-size: 10px; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .nav-item.active { color: white; }
        .nav-icon { font-size: 20px; }
    </style>
</head>
<body>

    <div class="header">
        <div style="font-size: 20px; opacity: 0.5;">⚙️</div>
        <div class="balance-top">💎 <span id="top-balance">5000</span></div>
    </div>

    <div class="profile-card">
        <div class="avatar"><img id="user-photo" src="https://placeholder.com" alt=""></div>
        <div class="username" id="user-name">@Игрок</div>
        
        <div class="stats-grid">
            <div class="stat-item">
                <span class="stat-val" id="games-count">0</span>
                <span class="stat-lbl">Игры</span>
            </div>
            <div class="stat-item">
                <span class="stat-val" id="best-win">0 💎</span>
                <span class="stat-lbl">Лучший выигрыш</span>
            </div>
        </div>
    </div>

    <div class="action-btn" onclick="openGames()">ИГРАТЬ 🚀</div>
    <div class="action-btn" style="background: #222; margin-top: -10px;" onclick="openStats()">📊 СТАТИСТИКА</div>

    <div class="nav-bar">
        <div class="nav-item"><span class="nav-icon">🛒</span>Маркет</div>
        <div class="nav-item"><span class="nav-icon">⚔️</span>Арена</div>
        <div class="nav-item"><span class="nav-icon">🎁</span>Инвентарь</div>
        <div class="nav-item active"><span class="nav-icon">👤</span>Профиль</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        tg.setHeaderColor('#000000');

        // Подтягиваем данные из Телеграм
        const user = tg.initDataUnsafe?.user;
        if (user) {
            document.getElementById('user-name').innerText = user.username ? `@${user.username}` : user.first_name;
            if (user.photo_url) document.getElementById('user-photo').src = user.photo_url;
        }

        function openGames() {
            tg.showPopup({ message: "Список игр скоро появится!" });
        }

        function openStats() {
            tg.showPopup({ message: "Тут будет детальная статистика" });
        }
    </script>
</body>
</html>
