  <style>
    /* 1. ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ */
    :root { 
        --bg: #000; 
        --accent: #9d4edd; 
        --card: #151515; 
        --gray: #888; 
        --success: #4cd137;
        --error: #ff4757;
        --text: #ffffff;
    }
    
    body { 
        background: var(--bg); 
        color: var(--text); 
        font-family: -apple-system, system-ui, sans-serif; 
        margin: 0; 
        padding: 0; 
        overflow: hidden; 
        height: 100vh; 
    }

    /* 2. ЭКРАН ЗАГРУЗКИ */
    #loader { 
        position: fixed; inset: 0; background: #0f1721; 
        display: flex; flex-direction: column; align-items: center; justify-content: center; 
        z-index: 10000; transition: 0.5s;
    }
    .spinner { 
        width: 40px; height: 40px; border: 4px solid rgba(51, 144, 236, 0.1); 
        border-top: 4px solid #3390ec; border-radius: 50%; animation: spin 1s linear infinite; 
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 3. КОНТЕНТ И ЭКРАНЫ */
    #app { display: none; flex-direction: column; height: 100vh; opacity: 0; transition: 0.5s; }
    .screen { display: none; flex-direction: column; height: 100%; overflow-y: auto; padding-bottom: 100px; }
    .active { display: flex !important; }
    
    /* 4. КНОПКИ (ИСПРАВЛЕНИЕ ЦВЕТА) */
    .btn-main {
        background: var(--accent) !important;
        color: #fff !important;
        margin: 15px;
        padding: 20px;
        border-radius: 20px;
        text-align: center;
        font-weight: 800;
        font-size: 16px;
        cursor: pointer;
        border: none;
        box-shadow: 0 4px 15px rgba(157, 78, 221, 0.3);
    }

    /* 5. ИНТЕРФЕЙС КУБИКА (OVERLAY) */
    #dice-overlay {
        position: fixed; inset: 0; background: rgba(0,0,0,0.95);
        display: none; flex-direction: column; align-items: center; justify-content: center; 
        z-index: 9999; backdrop-filter: blur(10px);
    }
    
    .dice {
        width: 110px; height: 110px; background: #fff !important; border-radius: 25px;
        display: flex; align-items: center; justify-content: center;
        font-size: 65px; color: #000 !important; 
        box-shadow: 0 0 50px var(--accent);
        z-index: 10000;
    }

    /* 6. АНИМАЦИЯ КУБИКА */
    .rolling { 
        animation: roll 0.12s infinite linear !important; 
    }
    
    @keyframes roll {
        0% { transform: rotate(0deg) scale(1); }
        25% { transform: rotate(90deg) translateY(-5px); }
        50% { transform: rotate(180deg) scale(1.1); }
        75% { transform: rotate(270deg) translateY(5px); }
        100% { transform: rotate(360deg) scale(1); }
    }

    /* 7. МЕНЮ */
    nav { 
        position: fixed; bottom: 0; width: 100%; background: #0a0a0a; 
        display: flex; justify-content: space-around; padding: 15px 0 35px; 
        border-top: 1px solid #1a1a1a; z-index: 1000; 
    }
    nav div { color: var(--gray); font-size: 10px; text-align: center; cursor: pointer; }


      /* 8. СЛОТЫ */
.slot-machine {
    background: #222;
    border: 5px solid #444;
    border-radius: 20px;
    padding: 15px;
    display: flex;
    gap: 10px;
    justify-content: center;
    box-shadow: inset 0 0 20px #000;
}

.reel {
    width: 70px;
    height: 100px;
    background: #fff;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;

    overflow: hidden;

    box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
}

/* Красивая надпись GIG */
.symbol-gig {

    -webkit-text-fill-color: transparent;
    text-shadow: 0 0 5px rgba(157, 78, 221, 0.5);
}

/* Огненная семерка */
.symbol-seven {
    color: #ff4500;
    font-weight: bold;
    text-shadow: 0 0 10px #ff8c00;
}

      

      
      
</style>

   <script>
        const tg = window.Telegram.WebApp;
        let tonConnectUI;

        function initApp() {
            try {
                tg.ready();
                tg.expand();
                const user = tg.initDataUnsafe?.user;
                if (user) {
                    document.getElementById('u-name').innerText = user.username ? '@' + user.username : user.first_name;

               // 2. ПЕРЕКЛЮЧЕНИЕ ВКЛАДОК
    function showTab(id) {
        // Скрываем все экраны
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        // Показываем нужный
        const target = document.getElementById(id);
        if (target) target.classList.add('active');
        
        // Подсветка кнопок в меню (если ID совпадает)
        const nArena = document.getElementById('n-arena');
        const nProfile = document.getElementById('n-profile');
        
        if (nArena) nArena.style.color = (id === 'scr-arena') ? 'var(--accent)' : 'var(--gray)';
        if (nProfile) nProfile.style.color = (id === 'scr-profile') ? '#fff' : 'var(--gray)';
        
        // Тактильная отдача
        tg.HapticFeedback.impactOccurred('light');
    }

               // 3. ПОЛНЫЙ СПИСОК ИГР (16 ШТУК)
    const gameLibrary = [
        { n: "Кубик", i: "🎲" }, { n: "Слот Классик", i: "🎰" },
        { n: "Цель", i: "🎯" }, { n: "Орел/Решка", i: "🪙" },
        { n: "Ракетка X100", i: "📈" }, { n: "Ракетка Stable", i: "📉" },
        { n: "Кейс Крипта", i: "📦" }, { n: "Кейс NFT", i: "🖼" },
        { n: "Слот Золото", i: "💰" }, { n: "Слот Фрукты", i: "🍎" },
        { n: "Слот Египет", i: "🏺" }, { n: "Карты", i: "🃏", pvp: true },
        { n: "Рулетка", i: "🔫", pvp: true }, { n: "Портал", i: "🌀" },
        { n: "Мины", i: "💣" }, { n: "Краш", i: "🚀" }
    ];

    // Функция отрисовки карточек
                function renderGames() {
        const grid = document.getElementById('games-list');
        if (!grid) return;
        grid.innerHTML = ""; 

        gameLibrary.forEach(g => {
            const div = document.createElement('div');
            div.style = "background:var(--card); border-radius:20px; padding:20px; border:1px solid #222; text-align:center; position:relative; cursor:pointer;";
            
           div.onclick = () => {
    tg.HapticFeedback.impactOccurred('medium');
    const name = g.n.toLowerCase();

    if (name.includes("кубик") || name.includes("кост")) {
        openBetPopup();
    } 
    else if (name.includes("слот")) {
        const val = prompt("Ставка на Слоты 🎰:", "100");
        if (val) {
            const amount = parseInt(val.replace(/\D/g, ''));
            if (amount > 0) startSlots(amount);
        }
    } 
    else if (name.includes("цель")) {
        const val = prompt("Ставка на Меткость 🎯:", "100");
        if (val) {
            const amount = parseInt(val.replace(/\D/g, ''));
            if (amount > 0) startTargetGame(amount);
        }
    } 
        else if (name.includes("краш") || name.includes("ракет")) {
    const val = prompt("Ставка на Полет 🚀:", "100");
    if (val) {
        const amount = parseInt(val.replace(/\D/g, ''));
        if (amount > 0) startRocket(amount);
    }
}

    else {
        tg.showAlert(`Игра "${g.n}" в разработке 🛠`);
    }
};




            div.innerHTML = `
                ${g.pvp ? '<span style="position:absolute;top:8px;right:8px;background:var(--accent);font-size:8px;padding:2px 6px;border-radius:8px;font-weight:bold;">PVP</span>' : ''}
                <div style="font-size:38px;margin-bottom:10px;">${g.i}</div>
                <div style="font-size:13px;font-weight:bold;">${g.n}</div>
            `;
            grid.appendChild(div);
        });
    }


// 4. ОКНО ВЫБОРА СТАВКИ
function openBetPopup() {
    // 1. Сразу спрашиваем сумму
    const userVal = prompt("Введите сумму ставки 💎:", "100");
    
    // 2. Если пользователь не нажал "Отмена"
    if (userVal !== null && userVal !== "") {
        // Очищаем ввод от букв и пробелов
        const amount = parseInt(userVal.replace(/\D/g, ''));
        
        // 3. Проверяем, что введено число больше 0
        if (!isNaN(amount) && amount > 0) {
            // Запускаем игру
            startDiceGame(amount);
        } else {
            // Если ввел ерунду - выводим предупреждение
            if (window.Telegram?.WebApp?.showAlert) {
                tg.showAlert("❌ Пожалуйста, введите корректное число!");
            } else {
                alert("❌ Введите корректное число!");
            }
        }
    }
}


// 5. ОСНОВНАЯ ЛОГИКА ИГРЫ КУБИК
function startDiceGame(bet) {
    const balLabel = document.getElementById('top-bal');
    const arenaBal = document.getElementById('arena-bal');
    const overlay = document.getElementById('dice-overlay');
    const visual = document.getElementById('dice-visual');
    const status = document.getElementById('dice-status');
    const closeBtn = document.getElementById('dice-close');

    let currentBal = parseInt(balLabel.innerText.replace(/\s/g, ''));
    if (currentBal < bet) {
        tg.showAlert("Недостаточно 💎!");
        return;
    }

    // Списываем ставку сразу
    currentBal -= bet;
    balLabel.innerText = currentBal.toLocaleString();
    if (arenaBal) arenaBal.innerText = currentBal.toLocaleString();

    // ЗАПУСК АНИМАЦИИ
    overlay.style.display = 'flex';
    visual.classList.add('rolling');
    status.innerText = "Испытываем удачу...";
    closeBtn.style.display = 'none';

    // ЭФФЕКТ МЕЛЬКАНИЯ ГРАНЕЙ
    const faces = ["⚀", "⚁", "⚂", "⚃", "⚄", "⚅"];
    let flicker = setInterval(() => {
        visual.innerText = faces[Math.floor(Math.random() * faces.length)];
    }, 80);

    setTimeout(() => {
        clearInterval(flicker);
        visual.classList.remove('rolling');
        
        const res = Math.floor(Math.random() * 6) + 1; // 1-6
        visual.innerText = faces[res - 1];

        let changeForDb = -bet; // По умолчанию проигрыш для базы

        if (res === 6) {
            // ПОБЕДА: Тройная выплата
            const winAmount = bet * 3;
            currentBal += winAmount;
            changeForDb = winAmount - bet; // Чистая прибыль (например, +200 при ставке 100)
            
            status.innerHTML = `<span style="color:#4cd137">🔥 ДЖЕКПОТ! +${winAmount} 💎</span>`;
            tg.HapticFeedback.notificationOccurred('success');
        } else {
            // ПРОИГРЫШ
            status.innerHTML = `<span style="color:#ff4757">Выпало ${res}. Попробуй еще раз!</span>`;
            tg.HapticFeedback.notificationOccurred('error');
        }

        // Обновляем визуальный баланс
        balLabel.innerText = currentBal.toLocaleString();
        if (arenaBal) arenaBal.innerText = currentBal.toLocaleString();
        closeBtn.style.display = 'block';

        // Отправляем результат в бот для обновления SQLite
        tg.sendData(JSON.stringify({
            action: "game_result",
            amount: changeForDb
        }));
    }, 1800);
}

    // 8. ФУНКЦИЯ ЗАКРЫТИЯ КУБИКА
    function closeDice() {
        const overlay = document.getElementById('dice-overlay');
        if (overlay) overlay.style.display = 'none';
        tg.HapticFeedback.impactOccurred('light');
    }

        // 6. ИНИЦИАЛИЗАЦИЯ TON CONNECT
function initTon() {
    try {
        tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://indra1800.github.io/gigkaz/tonconnect-manifest.json',
            buttonRootId: 'ton-connect-btn'
        });

        // Слушаем изменения статуса кошелька
        tonConnectUI.onStatusChange(wallet => {
            if (wallet) {
                tg.sendData(JSON.stringify({
                    action: "bind_wallet",
                    address: wallet.account.address
                }));
            }
        });
    } catch (e) {
        console.error("TonConnect Error:", e);
    }
}


// Конфигурация символов
const slotSymbols = [
    { id: 'berry', html: '🍓' },
    { id: 'cherry', html: '🍒' },
    { id: 'gig', html: '<span class="symbol-gig">GIG</span>' },
    { id: 'seven', html: '<span class="symbol-seven">7</span>' }
];

// Математика редкости (Pool)
// Чем больше одинаковых ID в массиве, тем чаще они выпадают
const slotPool = [
    'berry','berry','berry','berry', 
    'cherry','cherry','cherry', 
    'gig','gig', 
    'seven' // Всего одна семерка — шанс ~10% на барабан
];

function startSlots(bet) {
    const balLabel = document.getElementById('top-bal');
    let currentBal = parseInt(balLabel.innerText.replace(/\s/g, ''));
    
    if (currentBal < bet) {
        tg.showAlert("Недостаточно 💎!");
        return;
    }

    // Списание баланса
    currentBal -= bet;
    updateUIBalance(currentBal);

    const visual = [document.getElementById('reel1'), document.getElementById('reel2'), document.getElementById('reel3')];
    const status = document.getElementById('slots-status');
    const closeBtn = document.getElementById('slots-close');
    
    document.getElementById('slots-overlay').style.display = 'flex';
    closeBtn.style.display = 'none';
    status.innerText = "Вращаем барабаны...";

    // Звук спина
    const sndSpin = document.getElementById('snd-spin');
    if(sndSpin) sndSpin.play();

    // Анимация кручения
    let spins = 0;
    let interval = setInterval(() => {
        visual.forEach(r => {
            const randomSym = slotSymbols[Math.floor(Math.random() * slotSymbols.length)];
            r.innerHTML = randomSym.html;
            r.style.transform = `translateY(${Math.random() * 4 - 2}px)`;
        });
        spins++;
        if (spins > 20) {
            clearInterval(interval);
            finishSlots(bet, visual, status, closeBtn);
        }
    }, 80);
}

function finishSlots(bet, visual, status, closeBtn) {
    // Определяем результат по весам
    const results = [
        slotPool[Math.floor(Math.random() * slotPool.length)],
        slotPool[Math.floor(Math.random() * slotPool.length)],
        slotPool[Math.floor(Math.random() * slotPool.length)]
    ];

    // Отрисовка финальных символов
    visual.forEach((r, i) => {
        const sym = slotSymbols.find(s => s.id === results[i]);
        r.innerHTML = sym.html;
        r.style.transform = "translateY(0)";
    });

    let multiplier = 0;
    // Проверка комбинации (3 в ряд)
    if (results[0] === results[1] && results[1] === results[2]) {
        const winner = results[0];
        if (winner === 'seven') multiplier = 5;
        else if (winner === 'gig') multiplier = 3;
        else multiplier = 2; // Клубника или Вишня
    }

    let change = -bet;
    if (multiplier > 0) {
        const winAmount = bet * multiplier;
        change = winAmount - bet;
        status.innerHTML = `<span style="color:#4cd137">🔥 ВЫИГРЫШ: ${winAmount} 💎</span>`;
        
        const sndWin = document.getElementById('snd-win');
        if(sndWin) sndWin.play();
        tg.HapticFeedback.notificationOccurred('success');
        
        updateUIBalance(getRawBalance() + winAmount);
    } else {
        status.innerHTML = `<span style="color:#ff4757">Попробуй снова!</span>`;
        tg.HapticFeedback.notificationOccurred('error');
    }

    closeBtn.style.display = 'inline-block';

    // Отправка в базу
    tg.sendData(JSON.stringify({
        action: "game_result",
        amount: change
    }));
}

// Вспомогательные функции ДАРС
function updateUIBalance(newVal) {
    const b1 = document.getElementById('top-bal');
    const b2 = document.getElementById('arena-bal');
    if(b1) b1.innerText = newVal.toLocaleString();
    if(b2) b2.innerText = newVal.toLocaleString();
}

function getRawBalance() {
    return parseInt(document.getElementById('top-bal').innerText.replace(/\s/g, ''));
}

function closeSlots() {
    document.getElementById('slots-overlay').style.display = 'none';
}

function updateVisualBalance(change) {
    const bal = document.getElementById('top-bal');
    let current = parseInt(bal.innerText.replace(/\s/g, ''));
    bal.innerText = (current + change).toLocaleString();
}

function startTargetGame(bet) {
    const balLabel = document.getElementById('top-bal');
    let currentBal = getRawBalance();
    
    if (currentBal < bet) {
        tg.showAlert("Недостаточно 💎!");
        return;
    }

    updateUIBalance(currentBal - bet);

    const overlay = document.getElementById('target-overlay');
    const dart = document.getElementById('dart');
    const status = document.getElementById('target-status');
    const closeBtn = document.getElementById('target-close');

    overlay.style.display = 'flex';
    closeBtn.style.display = 'none';
    dart.style.display = 'none';
    status.innerText = "Целимся...";

    // Анимация броска через 1 секунду
    setTimeout(() => {
        status.innerText = "БРОСОК! 🚀";
        
        // Рандомим результат (0 - промах, 1 - 2x, 2 - 3x, 3 - 5x)
        // Массив шансов: чем больше нулей, тем чаще промах
        const chances = [0, 0, 0, 0, 0, 1, 1, 2, 3]; 
        const result = chances[Math.floor(Math.random() * chances.length)];

        // Показываем дротик в зависимости от результата
        dart.style.display = 'block';
        
        if (result === 0) {
            // Анимация отскока (дротик падает вниз)
            dart.style.left = "50%"; dart.style.top = "10%";
            setTimeout(() => { 
                dart.style.transition = "all 0.5s ease-in";
                dart.style.top = "110%"; 
                status.innerHTML = "<span style='color:#ff4757'>ОТСКОЧИЛ! ❌</span>";
                tg.HapticFeedback.notificationOccurred('error');
                finishTarget(bet, 0);
            }, 300);
        } else {
            // Попадание
            dart.style.transition = "none";
            if (result === 1) { dart.style.left = "70%"; dart.style.top = "30%"; } // 2x
            if (result === 2) { dart.style.left = "40%"; dart.style.top = "70%"; } // 3x
            if (result === 3) { dart.style.left = "48%"; dart.style.top = "48%"; } // 5x (Центр)
            
            let mult = (result === 1) ? 2 : (result === 2 ? 3 : 5);
            status.innerHTML = `<span style='color:#4cd137'>ПОПАЛ! x${mult} 🔥</span>`;
            tg.HapticFeedback.notificationOccurred('success');
            finishTarget(bet, mult);
        }
    }, 1200);
}

function finishTarget(bet, mult) {
    let win = bet * mult;
    let change = win - bet;
    
    if (win > 0) updateUIBalance(getRawBalance() + win);
    
    document.getElementById('target-close').style.display = 'inline-block';
    tg.sendData(JSON.stringify({ action: "game_result", amount: change }));
}

function closeTarget() {
    document.getElementById('target-overlay').style.display = 'none';
    document.getElementById('dart').style.transition = "none";
}

/*КРАШ*/

       
let rocketInterval;
let currentX = 1.00;
let crashPoint = 0;
let rocketBet = 0;
let isRocketFlying = false;

function startRocket(bet) {
    rocketBet = bet;
    currentX = 1.00;
    isRocketFlying = false; // Пока идет отсчет, лететь нельзя
    
    const r = Math.random();
    crashPoint = Math.max(1, (0.99 / (1 - r))).toFixed(2);
    
    const overlay = document.getElementById('rocket-overlay');
    const cashBtn = document.getElementById('rocket-cashout');
    const closeBtn = document.getElementById('rocket-close');
    const multText = document.getElementById('rocket-multiplier');
    const profitText = document.getElementById('rocket-profit');
    const rocketObj = document.getElementById('rocket-obj');

    overlay.style.display = 'flex';
    overlay.style.background = 'skyblue';
    document.getElementById('stars-container').innerHTML = '';
    
    cashBtn.style.display = 'none'; // Прячем кнопку забрать во время отсчета
    closeBtn.style.display = 'none';
    rocketObj.style.transform = 'translateY(0)';
    multText.style.color = 'white';

    // ОТСЧЕТ 3 СЕКУНДЫ
    let countdown = 3;
    multText.innerText = countdown;
    profitText.innerText = "Приготовьтесь...";

    let countdownInterval = setInterval(() => {
        countdown--;
        if (countdown > 0) {
            multText.innerText = countdown;
            tg.HapticFeedback.impactOccurred('medium');
        } else {
            clearInterval(countdownInterval);
            launchRocket(bet, multText, profitText, cashBtn, rocketObj);
        }
    }, 1000);
}

// Вынесли запуск в отдельную функцию для чистоты
function launchRocket(bet, multText, profitText, cashBtn, rocketObj) {
    isRocketFlying = true;
    cashBtn.style.display = 'inline-block';
    multText.innerText = "1.00x";
    tg.HapticFeedback.notificationOccurred('success'); // Вибрация на старт

    const overlay = document.getElementById('rocket-overlay');
    const stars = document.getElementById('stars-container');

    rocketInterval = setInterval(() => {
        currentX += 0.01 + (currentX * 0.005);
        const displayX = currentX.toFixed(2);
        
        multText.innerText = displayX + "x";
        profitText.innerText = "Выплата: " + Math.floor(bet * displayX) + " 💎";
        
        // Смена неба
        if (currentX > 1.5) overlay.style.background = '#1e3799';
        if (currentX > 3.0) overlay.style.background = '#0c2461';
        if (currentX > 5.0) {
            overlay.style.background = '#0a0a0a';
            if (stars.children.length < 20) createStar();
        }

        // Тряска ракеты
        rocketObj.style.transform = `translateY(${Math.sin(Date.now()/50)*5}px)`;

        if (currentX >= crashPoint) {
            rocketCrash();
        }
    }, 50);
}

function rocketCrash() {
    clearInterval(rocketInterval);
    isRocketFlying = false;
    
    const multText = document.getElementById('rocket-multiplier');
    const statusText = document.getElementById('rocket-profit');
    const rocketObj = document.getElementById('rocket-obj');
    
    multText.innerText = "BOOM! " + currentX.toFixed(2) + "x";
    multText.style.color = "#ff4757";
    statusText.innerText = "Ракетка взорвалась... 💀";
    rocketObj.style.transform = "scale(2)";
    rocketObj.innerText = "💥";
    
    document.getElementById('rocket-cashout').style.display = 'none';
    document.getElementById('rocket-close').style.display = 'inline-block';
    
    tg.HapticFeedback.notificationOccurred('error');
    tg.sendData(JSON.stringify({ action: "game_result", amount: -rocketBet }));
}

function rocketCashout() {
    if (!isRocketFlying) return;
    clearInterval(rocketInterval);
    isRocketFlying = false;

    const win = Math.floor(rocketBet * currentX);
    const profit = win - rocketBet;
    
    document.getElementById('rocket-profit').innerHTML = `<span style="color:#4cd137">ЗАБРАЛИ! +${win} 💎</span>`;
    document.getElementById('rocket-cashout').style.display = 'none';
    document.getElementById('rocket-close').style.display = 'inline-block';
    
    updateUIBalance(getRawBalance() + win);
    tg.HapticFeedback.notificationOccurred('success');
    tg.sendData(JSON.stringify({ action: "game_result", amount: profit }));
}

function createStar() {
    const star = document.createElement('div');
    star.style.position = 'absolute';
    star.style.left = Math.random() * 100 + '%';
    star.style.top = Math.random() * 100 + '%';
    star.style.width = '2px';
    star.style.height = '2px';
    star.style.background = 'white';
    star.style.borderRadius = '50%';
    document.getElementById('stars-container').appendChild(star);
}

function closeRocket() {
    document.getElementById('rocket-overlay').style.display = 'none';
    document.getElementById('rocket-obj').innerText = "🚀";
}
