<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GIG CASINO</title>

    <!-- 1. ПОДКЛЮЧАЕМ БИБЛИОТЕКИ (ТОЛЬКО ТАК) -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>

    
  <style>
    /* 1. ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ */
    :root { 
        --bg: #000; 
        --accent: #9d4edd; 
        --card: #151515; 
        --gray: #888; 
        --success: #4cd137;
        --error: #ff4757;
        --text: #ffffff;
    }
    
    body { 
        background: var(--bg); 
        color: var(--text); 
        font-family: -apple-system, system-ui, sans-serif; 
        margin: 0; 
        padding: 0; 
        overflow: hidden; 
        height: 100vh; 
    }

    /* 2. ЭКРАН ЗАГРУЗКИ */
    #loader { 
        position: fixed; inset: 0; background: #0f1721; 
        display: flex; flex-direction: column; align-items: center; justify-content: center; 
        z-index: 10000; transition: 0.5s;
    }
    .spinner { 
        width: 40px; height: 40px; border: 4px solid rgba(51, 144, 236, 0.1); 
        border-top: 4px solid #3390ec; border-radius: 50%; animation: spin 1s linear infinite; 
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 3. КОНТЕНТ И ЭКРАНЫ */
    #app { display: none; flex-direction: column; height: 100vh; opacity: 0; transition: 0.5s; }
    .screen { display: none; flex-direction: column; height: 100%; overflow-y: auto; padding-bottom: 100px; }
    .active { display: flex !important; }
    
    /* 4. КНОПКИ (ИСПРАВЛЕНИЕ ЦВЕТА) */
    .btn-main {
        background: var(--accent) !important;
        color: #fff !important;
        margin: 15px;
        padding: 20px;
        border-radius: 20px;
        text-align: center;
        font-weight: 800;
        font-size: 16px;
        cursor: pointer;
        border: none;
        box-shadow: 0 4px 15px rgba(157, 78, 221, 0.3);
    }

    /* 5. ИНТЕРФЕЙС КУБИКА (OVERLAY) */
    #dice-overlay {
        position: fixed; inset: 0; background: rgba(0,0,0,0.95);
        display: none; flex-direction: column; align-items: center; justify-content: center; 
        z-index: 9999; backdrop-filter: blur(10px);
    }
    
    .dice {
        width: 110px; height: 110px; background: #fff !important; border-radius: 25px;
        display: flex; align-items: center; justify-content: center;
        font-size: 65px; color: #000 !important; 
        box-shadow: 0 0 50px var(--accent);
        z-index: 10000;
    }

    /* 6. АНИМАЦИЯ КУБИКА */
    .rolling { 
        animation: roll 0.12s infinite linear !important; 
    }
    
    @keyframes roll {
        0% { transform: rotate(0deg) scale(1); }
        25% { transform: rotate(90deg) translateY(-5px); }
        50% { transform: rotate(180deg) scale(1.1); }
        75% { transform: rotate(270deg) translateY(5px); }
        100% { transform: rotate(360deg) scale(1); }
    }

    /* 7. МЕНЮ */
    nav { 
        position: fixed; bottom: 0; width: 100%; background: #0a0a0a; 
        display: flex; justify-content: space-around; padding: 15px 0 35px; 
        border-top: 1px solid #1a1a1a; z-index: 1000; 
    }
    nav div { color: var(--gray); font-size: 10px; text-align: center; cursor: pointer; }
</style>

</head>      
    
<body>

    <div id="loader">
        <div class="spinner"></div>
        <p style="color:#3390ec; margin-top:15px; font-weight: bold; letter-spacing: 2px;">GIG CASINO</p>
    </div>

    <!-- 1. ОКНО ИГРЫ В КУБИК (ВЫНЕСЛИ ИЗ #APP ДЛЯ КОРРЕКТНОЙ АНИМАЦИИ) -->
        <div id="dice-overlay">
        <div id="dice-visual" class="dice">?</div>
        <h2 id="dice-status" style="color: #ffffff; margin-top: 25px; font-family: sans-serif; text-shadow: 0 2px 10px rgba(0,0,0,0.5);">Крутим...</h2>
        <button id="dice-close" onclick="closeDice()" style="display:none; background: var(--accent); border: none; color: #ffffff; padding: 12px 40px; border-radius: 12px; margin-top: 20px; font-weight: bold; font-size: 16px; cursor: pointer; box-shadow: 0 4px 20px rgba(157, 78, 221, 0.4);">ОК</button>
    </div>

 <!-- 2. ОКНО ИГРЫ СЛОТЫ -->
<div id="slots-overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:9999; flex-direction:column; align-items:center; justify-content:center; backdrop-filter:blur(10px);">
    <div style="background:linear-gradient(180deg, #2d1b4d 0%, #151515 100%); padding:30px; border-radius:30px; border:2px solid var(--accent); text-align:center; width:85%;">
        <h2 style="color:white; margin-bottom:20px; letter-spacing:2px;">GIG SLOTS</h2>
        
        <!-- Барабаны -->
        <div style="display:flex; justify-content:center; gap:10px; background:#000; padding:20px; border-radius:20px; border:1px solid #333; margin-bottom:20px; font-size:50px;">
            <div id="reel1">🍓</div>
            <div id="reel2">💎</div>
            <div id="reel3">🍒</div>
        </div>

        <h3 id="slots-status" style="color:white; min-height:1.5em;">Удачи!</h3>
        <button id="slots-close" onclick="closeSlots()" style="display:none; background:var(--accent); border:none; color:white; padding:12px 30px; border-radius:12px; margin-top:15px; font-weight:bold;">ОК</button>
    </div>
</div>


    
    <div id="app">
        <!-- ЭКРАН 1: ПРОФИЛЬ -->
        <div id="scr-profile" class="screen active">
            <div style="padding: 20px; display: flex; justify-content: space-between; align-items: center;">
                <div style="font-size: 20px;">⚙️</div>
                <div style="background: rgba(157, 78, 221, 0.1); padding: 6px 14px; border-radius: 20px; color: var(--accent); font-weight: bold; border: 1px solid rgba(157, 78, 221, 0.2);">
                    💎 <span id="top-bal">5 000</span>
                </div>
            </div>

            <div style="background: linear-gradient(180deg, #2d1b4d 0%, #151515 100%); margin: 10px 15px; border-radius: 28px; padding: 30px 20px; text-align: center; border: 1px solid rgba(255,255,255,0.05);">
                <div style="width: 85px; height: 85px; background: #222; border-radius: 25px; margin: 0 auto 15px; border: 2px solid var(--accent); overflow: hidden;">
                    <img id="u-photo" src="" style="width: 100%; height: 100%; object-fit: cover; display: none;">
                </div>
                <div id="u-name" style="font-size: 22px; font-weight: 900; margin-bottom: 5px;">@Игрок</div>
                <div id="u-id" style="font-size: 11px; color: var(--gray); margin-bottom: 20px;">ID: 000000</div>
                
                <div style="display: flex; justify-content: space-around; margin-top: 25px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 20px;">
                    <div style="text-align: center;"><b id="s-games" style="display: block; font-size: 20px;">0</b><small style="color: var(--gray); font-size: 10px; text-transform: uppercase;">Игры</small></div>
                    <div style="text-align: center;"><b id="s-win" style="display: block; font-size: 20px;">0 💎</b><small style="color: var(--gray); font-size: 10px; text-transform: uppercase;">Рекорд</small></div>
                </div>
            </div>

            <div id="ton-connect-btn"></div>

            <!-- ИСПОЛЬЗУЕМ КЛАСС btn-main ДЛЯ КОРРЕКТНОГО ЦВЕТА -->
            <div class="btn-main" onclick="showTab('scr-arena')">ИГРАТЬ 🚀</div>
            
            <div onclick="window.Telegram.WebApp.showPopup({message:'Статистика в разработке'})" style="background: #151515; color: #fff; margin: 0 15px; padding: 18px; border-radius: 20px; text-align: center; font-weight: bold; border: 1px solid #333; cursor: pointer;">📊 СТАТИСТИКА</div>
        </div>

        <!-- ЭКРАН 2: АРЕНА -->
        <div id="scr-arena" class="screen">
            <div style="padding: 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: #000; z-index: 100;">
                <div onclick="showTab('scr-profile')" style="font-size: 20px;">⬅️</div>
                <b style="font-size: 18px;">АРЕНА</b>
                <div style="color: var(--accent); font-weight: bold;">💎 <span id="arena-bal">5 000</span></div>
            </div>
            <div id="games-list" style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 10px 15px;"></div>
        </div>

        <nav>
            <div id="n-arena" onclick="showTab('scr-arena')">⚔️<br>Арена</div>
            <div id="n-profile" onclick="showTab('scr-profile')" style="color: white;">👤<br>Профиль</div>
        </nav>
    </div>

   <script>
        const tg = window.Telegram.WebApp;
        let tonConnectUI;

        function initApp() {
            try {
                tg.ready();
                tg.expand();
                const user = tg.initDataUnsafe?.user;
                if (user) {
                    document.getElementById('u-name').innerText = user.username ? '@' + user.username : user.first_name;
                    document.getElementById('u-id').innerText = 'ID: ' + user.id;
                    const photoEl = document.getElementById('u-photo');
                    if (user.photo_url && photoEl) {
                        photoEl.src = user.photo_url;
                        photoEl.style.display = 'block';
                    }
                }
            } catch (e) { console.error("Ошибка профиля:", e); }
        }

               // 2. ПЕРЕКЛЮЧЕНИЕ ВКЛАДОК
    function showTab(id) {
        // Скрываем все экраны
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        // Показываем нужный
        const target = document.getElementById(id);
        if (target) target.classList.add('active');
        
        // Подсветка кнопок в меню (если ID совпадает)
        const nArena = document.getElementById('n-arena');
        const nProfile = document.getElementById('n-profile');
        
        if (nArena) nArena.style.color = (id === 'scr-arena') ? 'var(--accent)' : 'var(--gray)';
        if (nProfile) nProfile.style.color = (id === 'scr-profile') ? '#fff' : 'var(--gray)';
        
        // Тактильная отдача
        tg.HapticFeedback.impactOccurred('light');
    }

               // 3. ПОЛНЫЙ СПИСОК ИГР (16 ШТУК)
    const gameLibrary = [
        { n: "Кубик", i: "🎲" }, { n: "Слот Классик", i: "🎰" },
        { n: "Цель", i: "🎯" }, { n: "Орел/Решка", i: "🪙" },
        { n: "Пульс X100", i: "📈" }, { n: "Пульс Stable", i: "📉" },
        { n: "Кейс Крипта", i: "📦" }, { n: "Кейс NFT", i: "🖼" },
        { n: "Слот Золото", i: "💰" }, { n: "Слот Фрукты", i: "🍎" },
        { n: "Слот Египет", i: "🏺" }, { n: "Карты", i: "🃏", pvp: true },
        { n: "Рулетка", i: "🔫", pvp: true }, { n: "Портал", i: "🌀" },
        { n: "Мины", i: "💣" }, { n: "Краш", i: "🚀" }
    ];

    // Функция отрисовки карточек
                function renderGames() {
        const grid = document.getElementById('games-list');
        if (!grid) return;
        grid.innerHTML = ""; 

        gameLibrary.forEach(g => {
            const div = document.createElement('div');
            div.style = "background:var(--card); border-radius:20px; padding:20px; border:1px solid #222; text-align:center; position:relative; cursor:pointer;";
            
           div.onclick = () => {
    if (g.n.includes("Кубик") || g.n.includes("Кости")) {
        openBetPopup(); // Твой старый prompt
    } else if (g.n.includes("Слот Классик")) {
        // Спрашиваем ставку и запускаем слоты
        const val = prompt("Ставка на Слоты:", "100");
        if (val) startSlots(parseInt(val));
    } else {
        tg.showAlert("В разработке...");
    }
};



            div.innerHTML = `
                ${g.pvp ? '<span style="position:absolute;top:8px;right:8px;background:var(--accent);font-size:8px;padding:2px 6px;border-radius:8px;font-weight:bold;">PVP</span>' : ''}
                <div style="font-size:38px;margin-bottom:10px;">${g.i}</div>
                <div style="font-size:13px;font-weight:bold;">${g.n}</div>
            `;
            grid.appendChild(div);
        });
    }


// 4. ОКНО ВЫБОРА СТАВКИ
function openBetPopup() {
    // 1. Сразу спрашиваем сумму
    const userVal = prompt("Введите сумму ставки 💎:", "100");
    
    // 2. Если пользователь не нажал "Отмена"
    if (userVal !== null && userVal !== "") {
        // Очищаем ввод от букв и пробелов
        const amount = parseInt(userVal.replace(/\D/g, ''));
        
        // 3. Проверяем, что введено число больше 0
        if (!isNaN(amount) && amount > 0) {
            // Запускаем игру
            startDiceGame(amount);
        } else {
            // Если ввел ерунду - выводим предупреждение
            if (window.Telegram?.WebApp?.showAlert) {
                tg.showAlert("❌ Пожалуйста, введите корректное число!");
            } else {
                alert("❌ Введите корректное число!");
            }
        }
    }
}


// 5. ОСНОВНАЯ ЛОГИКА ИГРЫ КУБИК
function startDiceGame(bet) {
    const balLabel = document.getElementById('top-bal');
    const arenaBal = document.getElementById('arena-bal');
    const overlay = document.getElementById('dice-overlay');
    const visual = document.getElementById('dice-visual');
    const status = document.getElementById('dice-status');
    const closeBtn = document.getElementById('dice-close');

    let currentBal = parseInt(balLabel.innerText.replace(/\s/g, ''));
    if (currentBal < bet) {
        tg.showAlert("Недостаточно 💎!");
        return;
    }

    // Списываем ставку сразу
    currentBal -= bet;
    balLabel.innerText = currentBal.toLocaleString();
    if (arenaBal) arenaBal.innerText = currentBal.toLocaleString();

    // ЗАПУСК АНИМАЦИИ
    overlay.style.display = 'flex';
    visual.classList.add('rolling');
    status.innerText = "Испытываем удачу...";
    closeBtn.style.display = 'none';

    // ЭФФЕКТ МЕЛЬКАНИЯ ГРАНЕЙ
    const faces = ["⚀", "⚁", "⚂", "⚃", "⚄", "⚅"];
    let flicker = setInterval(() => {
        visual.innerText = faces[Math.floor(Math.random() * faces.length)];
    }, 80);

    setTimeout(() => {
        clearInterval(flicker);
        visual.classList.remove('rolling');
        
        const res = Math.floor(Math.random() * 6) + 1; // 1-6
        visual.innerText = faces[res - 1];

        let changeForDb = -bet; // По умолчанию проигрыш для базы

        if (res === 6) {
            // ПОБЕДА: Тройная выплата
            const winAmount = bet * 3;
            currentBal += winAmount;
            changeForDb = winAmount - bet; // Чистая прибыль (например, +200 при ставке 100)
            
            status.innerHTML = `<span style="color:#4cd137">🔥 ДЖЕКПОТ! +${winAmount} 💎</span>`;
            tg.HapticFeedback.notificationOccurred('success');
        } else {
            // ПРОИГРЫШ
            status.innerHTML = `<span style="color:#ff4757">Выпало ${res}. Попробуй еще раз!</span>`;
            tg.HapticFeedback.notificationOccurred('error');
        }

        // Обновляем визуальный баланс
        balLabel.innerText = currentBal.toLocaleString();
        if (arenaBal) arenaBal.innerText = currentBal.toLocaleString();
        closeBtn.style.display = 'block';

        // Отправляем результат в бот для обновления SQLite
        tg.sendData(JSON.stringify({
            action: "game_result",
            amount: changeForDb
        }));
    }, 1800);
}

    // 8. ФУНКЦИЯ ЗАКРЫТИЯ КУБИКА
    function closeDice() {
        const overlay = document.getElementById('dice-overlay');
        if (overlay) overlay.style.display = 'none';
        tg.HapticFeedback.impactOccurred('light');
    }

        // 6. ИНИЦИАЛИЗАЦИЯ TON CONNECT
function initTon() {
    try {
        tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://indra1800.github.io/gigkaz/tonconnect-manifest.json',
            buttonRootId: 'ton-connect-btn'
        });

        // Слушаем изменения статуса кошелька
        tonConnectUI.onStatusChange(wallet => {
            if (wallet) {
                tg.sendData(JSON.stringify({
                    action: "bind_wallet",
                    address: wallet.account.address
                }));
            }
        });
    } catch (e) {
        console.error("TonConnect Error:", e);
    }
}


const symbols = ["🍓", "🍒", "💎", "🍋", "🍇", "GIG", "777"];
// Веса (чем чаще символ, тем больше его в массиве для рандома)
const reelPool = ["🍓","🍓","🍒","🍒","💎","💎","🍋","🍋","🍇","🍇","GIG","777"];

function startSlots(bet) {
    const visual = [document.getElementById('reel1'), document.getElementById('reel2'), document.getElementById('reel3')];
    const status = document.getElementById('slots-status');
    const closeBtn = document.getElementById('slots-close');
    const sndSpin = document.getElementById('snd-spin');
    const sndWin = document.getElementById('snd-win');

    document.getElementById('slots-overlay').style.display = 'flex';
    closeBtn.style.display = 'none';
    status.innerText = "Крутим...";
    
    if(sndSpin) sndSpin.play();

    let spins = 0;
    let interval = setInterval(() => {
        visual.forEach(r => {
            r.innerText = symbols[Math.floor(Math.random() * symbols.length)];
            r.style.transform = `translateY(${Math.random() * 5}px)`;
        });
        spins++;
        if (spins > 20) {
            clearInterval(interval);
            finishSlots(bet, visual, status, closeBtn, sndWin);
        }
    }, 100);
}

function finishSlots(bet, visual, status, closeBtn, sndWin) {
    // Генерируем финальный результат с учетом редкости
    const res = [
        reelPool[Math.floor(Math.random() * reelPool.length)],
        reelPool[Math.floor(Math.random() * reelPool.length)],
        reelPool[Math.floor(Math.random() * reelPool.length)]
    ];

    visual.forEach((r, i) => {
        r.innerText = res[i];
        r.style.transform = "translateY(0)";
    });

    let multiplier = 0;
    const combo = res.join('');

    if (res[0] === res[1] && res[1] === res[2]) {
        if (res[0] === "777") multiplier = 5;
        else if (res[0] === "GIG") multiplier = 3;
        else if (res[0] === "🍓") multiplier = 2;
        else multiplier = 1.5; // За любые другие 3 одинаковых
    }

    let change = -bet;
    if (multiplier > 0) {
        const win = bet * multiplier;
        change = win - bet;
        status.innerHTML = `<span style="color:#4cd137">ВЫИГРЫШ: ${win} 💎</span>`;
        if(sndWin) sndWin.play();
        tg.HapticFeedback.notificationOccurred('success');
    } else {
        status.innerHTML = `<span style="color:#ff4757">Попробуй еще раз!</span>`;
    }

    closeBtn.style.display = 'block';
    updateVisualBalance(change);
    
    tg.sendData(JSON.stringify({ action: "game_result", amount: change }));
}

function closeSlots() {
    document.getElementById('slots-overlay').style.display = 'none';
}

function updateVisualBalance(change) {
    const bal = document.getElementById('top-bal');
    let current = parseInt(bal.innerText.replace(/\s/g, ''));
    bal.innerText = (current + change).toLocaleString();
}

       
// 7. ГЛАВНЫЙ ЗАПУСК ПРИЛОЖЕНИЯ
       window.onload = function() {
        // 1. Инициализируем данные и интерфейс
        initApp();
        renderGames();
        initTon();

        // 2. Скрываем лоадер через 1.5 секунды
        setTimeout(() => {
            const loader = document.getElementById('loader');
            const app = document.getElementById('app');
            
            if (loader) loader.style.display = 'none';
            
            if (app) {
                app.style.display = 'flex';
                // Плавное проявление (opacity)
                setTimeout(() => { 
                    app.style.opacity = '1'; 
                }, 50);
            }
        }, 1500);
    };

    // Закрываем скрипт и документ
    </script>

</body>
</html>
