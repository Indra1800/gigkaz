<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Gig Casino</title>
    <script src="https://telegram.org"></script>
    <style>
        :root { --bg-color: #000000; --card-bg: #151515; --accent: #9d4edd; --text-main: #ffffff; --text-gray: #888888; }
        body { background: var(--bg-color); color: var(--text-main); font-family: -apple-system, system-ui, sans-serif; margin: 0; padding: 0; overflow: hidden; height: 100vh; }

        /* ЛОАДЕР */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #0f1721; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
        }
        .loader-circle { width: 50px; height: 50px; border: 4px solid rgba(51, 144, 236, 0.2); border-top: 4px solid #3390ec; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ГЛАВНЫЙ ЭКРАН */
        #main-content { display: none; flex-direction: column; height: 100vh; opacity: 0; transition: opacity 0.5s ease; }

        .header { padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .balance-top { background: rgba(157, 78, 221, 0.1); padding: 6px 14px; border-radius: 20px; color: var(--accent); font-weight: bold; font-size: 14px; border: 1px solid rgba(157, 78, 221, 0.2); }
        
        .profile-card { background: linear-gradient(180deg, #2d1b4d 0%, #151515 100%); margin: 10px 15px; border-radius: 24px; padding: 25px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .avatar { width: 85px; height: 85px; background: #222; border-radius: 25px; margin: 0 auto 15px; overflow: hidden; border: 2px solid var(--accent); }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        
        .stats-grid { display: flex; justify-content: space-around; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 20px; margin-top: 20px; }
        .stat-item { display: flex; flex-direction: column; gap: 4px; }
        .stat-val { font-size: 18px; font-weight: 800; }
        .stat-lbl { font-size: 11px; color: var(--text-gray); text-transform: uppercase; letter-spacing: 1px; }

        .btn-play { background: var(--accent); color: white; margin: 20px 15px 10px; padding: 18px; border-radius: 20px; text-align: center; font-weight: 800; font-size: 16px; box-shadow: 0 10px 20px rgba(157, 78, 221, 0.3); }
        .btn-stats { background: #1a1a1a; color: white; margin: 0 15px; padding: 18px; border-radius: 20px; text-align: center; font-weight: bold; border: 1px solid #333; }

        .nav-bar { margin-top: auto; background: #0a0a0a; display: flex; justify-content: space-around; padding: 15px 0 35px; border-top: 1px solid #1a1a1a; }
        .nav-item { color: var(--text-gray); font-size: 10px; display: flex; flex-direction: column; align-items: center; gap: 6px; }
        .nav-item.active { color: var(--accent); }
    </style>
</head>
<body>

    <div id="loader">
        <div class="loader-circle"></div>
        <p style="color: #3390ec; font-weight: bold; margin-top: 15px; letter-spacing: 2px; font-size: 12px;">GIG CASINO</p>
    </div>

    <div id="main-content">
        <div class="header">
            <div style="font-size: 20px;">⚙️</div>
            <div class="balance-top">💎 <span id="top-balance">5 000</span></div>
        </div>

        <div class="profile-card">
            <div class="avatar"><img id="u-photo" src="https://placeholder.com" alt=""></div>
            <div id="u-name" style="font-size: 22px; font-weight: 800; margin-bottom: 5px;">@Игрок</div>
            <div style="font-size: 12px; color: var(--text-gray); margin-bottom: 20px;">ID: <span id="u-id">000000</span></div>
            
            <div class="stats-grid">
                <div class="stat-item">
                    <span class="stat-val">0</span>
                    <span class="stat-lbl">Игры</span>
                </div>
                <div class="stat-item">
                    <span class="stat-val">0 💎</span>
                    <span class="stat-lbl">Лучший выигрыш</span>
                </div>
            </div>
        </div>

        <div class="btn-play" onclick="window.Telegram.WebApp.showAlert('Арена откроется в следующем обновлении!')">ИГРАТЬ 🚀</div>
        <div class="btn-stats" onclick="window.Telegram.WebApp.showPopup({title: 'Статистика', message: 'Ваша история игр пуста'})">📊 СТАТИСТИКА</div>

        <div class="nav-bar">
            <div class="nav-item"><span>🛒</span>Маркет</div>
            <div class="nav-item"><span>⚔️</span>Арена</div>
            <div class="nav-item"><span>🎁</span>Инвентарь</div>
            <div class="nav-item active"><span>👤</span>Профиль</div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;

        function hideLoader() {
            document.getElementById('loader').style.display = 'none';
            const content = document.getElementById('main-content');
            content.style.display = 'flex';
            setTimeout(() => { content.style.opacity = '1'; }, 50);
        }

        try {
            tg.ready();
            tg.expand();
            tg.setHeaderColor('#000000');

            const user = tg.initDataUnsafe?.user;
            if (user) {
                document.getElementById('u-name').innerText = user.username ? '@' + user.username : user.first_name;
                document.getElementById('u-id').innerText = user.id;
                if (user.photo_url) document.getElementById('u-photo').src = user.photo_url;
            }
        } catch (e) {}

        // Принудительно открываем меню через 2 секунды
        setTimeout(hideLoader, 2000);
    </script>
</body>
</html>
