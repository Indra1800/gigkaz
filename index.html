<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Gig Casino</title>
    <script src="https://telegram.org"></script>
    <style>
        :root { --bg: #000; --card: #151515; --accent: #9d4edd; --gray: #888; --glass: rgba(255,255,255,0.05); }
        body { background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; margin: 0; padding: 0; overflow: hidden; height: 100vh; }

        /* ЛОАДЕР */
        #loader { position: fixed; inset: 0; background: #0f1721; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; pointer-events: none; transition: 0.5s; }
        .spinner { width: 40px; height: 40px; border: 4px solid #3390ec33; border-top: 4px solid #3390ec; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ЭКРАНЫ */
        .screen { display: none; flex-direction: column; height: 100vh; overflow-y: auto; padding-bottom: 100px; box-sizing: border-box; }
        .active-screen { display: flex !important; }

        /* ШАПКА */
        .header { padding: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: var(--bg); z-index: 100; }
        .balance-top { background: rgba(157, 78, 221, 0.1); padding: 6px 14px; border-radius: 20px; color: var(--accent); font-weight: bold; border: 1px solid rgba(157, 78, 221, 0.2); }

        /* ПРОФИЛЬ */
        .profile-card { background: linear-gradient(180deg, #2d1b4d 0%, #151515 100%); margin: 10px 15px; border-radius: 24px; padding: 25px; text-align: center; border: 1px solid var(--glass); }
        .avatar { width: 80px; height: 80px; background: #222; border-radius: 20px; margin: 0 auto 15px; border: 2px solid var(--accent); }
        .avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 18px; }

        /* КНОПКИ */
        .main-btn { background: var(--accent); color: white; margin: 10px 15px; padding: 18px; border-radius: 20px; text-align: center; font-weight: 800; cursor: pointer; z-index: 50; position: relative; }
        .main-btn:active { transform: scale(0.98); opacity: 0.9; }

        /* СЕТКА ИГР */
        .games-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px 15px; }
        .game-card { background: var(--card); border-radius: 20px; padding: 15px; border: 1px solid var(--glass); text-align: left; cursor: pointer; position: relative; }
        .game-icon { font-size: 24px; margin-bottom: 8px; display: block; }
        .game-title { font-weight: bold; font-size: 13px; display: block; }
        .tag-pvp { position: absolute; top: 10px; right: 10px; background: #ff4757; font-size: 8px; padding: 2px 6px; border-radius: 8px; }

        /* НАВИГАЦИЯ */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #0a0a0a; display: flex; justify-content: space-around; padding: 12px 0 30px; border-top: 1px solid #1a1a1a; z-index: 1000; }
        .nav-item { color: var(--gray); font-size: 10px; display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; flex: 1; }
        .nav-item.active { color: var(--accent); }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <p style="color: #3390ec; font-weight: bold; margin-top: 15px; font-size: 12px;">GIG CASINO</p>
    </div>

    <!-- ЭКРАН ПРОФИЛЯ -->
    <div id="screen-profile" class="screen active-screen">
        <div class="header">
            <div style="opacity: 0.5">⚙️</div>
            <div class="balance-top">💎 5 000</div>
        </div>
        <div class="profile-card">
            <div class="avatar"><img id="u-photo" src="https://placeholder.com"></div>
            <div id="u-name" style="font-size: 20px; font-weight: 800;">@Игрок</div>
            <div style="display:flex; justify-content: space-around; margin-top: 20px; border-top: 1px solid var(--glass); padding-top: 15px;">
                <div><b style="display:block">0</b><small style="color:var(--gray)">ИГРЫ</small></div>
                <div><b style="display:block">0 💎</b><small style="color:var(--gray)">РЕКОРД</small></div>
            </div>
        </div>
        <div class="main-btn" onclick="showScreen('screen-games')">ИГРАТЬ 🚀</div>
        <div class="main-btn" style="background:#1a1a1a; border:1px solid #333" onclick="window.Telegram.WebApp.showAlert('Статистика пуста')">📊 СТАТИСТИКА</div>
    </div>

    <!-- ЭКРАН ИГР (АРЕНА) -->
    <div id="screen-games" class="screen">
        <div class="header">
            <div onclick="showScreen('screen-profile')" style="padding: 5px">⬅️</div>
            <b style="font-size:16px">АРЕНА</b>
            <div class="balance-top">💎 5 000</div>
        </div>
        <div class="games-grid" id="games-list"></div>
    </div>

    <nav class="nav-bar">
        <div class="nav-item" onclick="window.Telegram.WebApp.showAlert('Маркет в разработке')"><span>🛒</span>Маркет</div>
        <div id="nav-arena" class="nav-item" onclick="showScreen('screen-games')"><span>⚔️</span>Арена</div>
        <div class="nav-item" onclick="window.Telegram.WebApp.showAlert('Инвентарь пуст')"><span>🎁</span>Инвентарь</div>
        <div id="nav-profile" class="nav-item active" onclick="showScreen('screen-profile')"><span>👤</span>Профиль</div>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        const games = [
            { n: "Классик Слот", i: "🎰" }, { n: "Кубик", i: "🎲" },
            { n: "Попади в цель", i: "🎯" }, { n: "Орел/Решка", i: "🪙" },
            { n: "Пульс X100", i: "📈" }, { n: "Пульс Stable", i: "📉" },
            { n: "Кейс: Крипта", i: "📦" }, { n: "Кейс: Стикеры", i: "🖼" },
            { n: "Кейс: NFT", i: "🖼" }, { n: "Слот: Золото", i: "💰" },
            { n: "Слот: Фрукты", i: "🍎" }, { n: "Слот: Египет", i: "🏺" },
            { n: "Карты", i: "🃏", pvp: true }, { n: "Рулетка", i: "🔫", pvp: true },
            { n: "Портал", i: "🌀" }, { n: "Мины", i: "💣" }
        ];

        function showScreen(id) {
            // Скрываем все экраны
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            // Показываем нужный
            document.getElementById(id).classList.add('active-screen');
            
            // Обновляем иконки в меню
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            if(id === 'screen-games') document.getElementById('nav-arena').classList.add('active');
            if(id === 'screen-profile') document.getElementById('nav-profile').classList.add('active');
        }

        // Рендер игр
        const list = document.getElementById('games-list');
        games.forEach(g => {
            const card = document.createElement('div');
            card.className = 'game-card';
            card.onclick = () => tg.showAlert('Запуск: ' + g.n);
            card.innerHTML = `${g.pvp ? '<span class="tag-pvp">PVP</span>':''}<span class="game-icon">${g.i}</span><span class="game-title">${g.n}</span>`;
            list.appendChild(card);
        });

        // Скрытие лоадера
        setTimeout(() => {
            const loader = document.getElementById('loader');
            loader.style.opacity = '0';
            setTimeout(() => loader.style.display = 'none', 500);
        }, 2000);

        const u = tg.initDataUnsafe?.user;
        if(u) {
            document.getElementById('u-name').innerText = u.username ? '@'+u.username : u.first_name;
            if(u.photo_url) document.getElementById('u-photo').src = u.photo_url;
        }
    </script>
</body>
</html>
